<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DimJiPiTi v3.3.2 - Audio Patch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        :root {
            --bg: #030303;
            --card: #0a0a0c;
            --text: #e4e4e7;
            --accent: #00FF41; 
            --alert: #FF3366;  
            --border: #27272a;
            --user-msg: #1a1a1a;
            --bot-msg: #003311;
            --call-bg: rgba(0, 0, 0, 0.95);
        }

        body { background-color: var(--bg); color: var(--text); font-family: 'Menlo', 'Courier New', monospace; margin: 0; padding: 15px; display: flex; justify-content: center; height: 100vh; box-sizing: border-box; overflow: hidden;}
        .container { width: 100%; max-width: 1200px; display: flex; flex-direction: column; height: 100%; position: relative; }
        
        .header { text-align: center; margin-bottom: 10px; flex-shrink: 0; transition: all 0.3s;}
        .title { font-size: 2.4rem; font-weight: bold; color: var(--text); margin: 0; letter-spacing: 2px;}
        .title span { color: var(--accent); }
        .subtitle { font-size: 0.85rem; font-weight: bold; color: #71717a; margin-top: 2px; letter-spacing: 4px; text-transform: uppercase;}

        .main-grid { display: grid; grid-template-columns: 350px 1fr 300px; gap: 15px; flex-grow: 1; min-height: 0; transition: all 0.5s ease-in-out;}

        /* LEFT COL: 3D + Settings */
        .left-col { display: flex; flex-direction: column; gap: 15px; z-index: 10;}
        .visual-stage { background-color: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px; position: relative; display: flex; align-items: center; justify-content: center; transition: all 0.5s ease-in-out;}
        
        #canvas-container { width: 100%; aspect-ratio: 1/1; background-color: #050505; border-radius: 6px; border: 1px solid var(--border); cursor: grab; transition: all 0.5s ease-in-out; overflow: hidden; position: relative;}
        #canvas-container canvas { width: 100% !important; height: 100% !important; object-fit: cover; }
        #canvas-container:active { cursor: grabbing; }
        
        #loading-text { position: absolute; color: var(--accent); font-weight: bold; animation: pulse 1.5s infinite; pointer-events: none;}
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* LIVE TRANSCRIPT: 8-bit font, overlaying the 3D model */
        .live-transcript {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            text-align: center;
            font-family: 'VT323', monospace;
            font-size: 2.2rem;
            font-style: italic;
            color: var(--accent);
            text-shadow: 2px 2px 0px #000, -2px -2px 0px #000, 2px -2px 0px #000, -2px 2px 0px #000, 0px 0px 15px var(--accent);
            z-index: 20;
            pointer-events: none;
            display: none; 
            line-height: 1.2;
        }

        .settings-panel { background-color: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 8px; display: flex; flex-direction: column; gap: 10px; transition: all 0.3s;}
        .settings-header { color: #71717a; font-size: 0.75rem; border-bottom: 1px solid var(--border); padding-bottom: 4px; font-weight: bold; letter-spacing: 1px;}
        .slider-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.85rem;}
        .slider-row label { font-weight: bold; color: var(--text); min-width: 120px;}
        .slider-row span { color: var(--accent); }
        input[type="range"] { flex-grow: 1; margin: 0 10px; cursor: pointer; accent-color: var(--accent); }
        
        .btn-toggle { background-color: rgba(0, 255, 65, 0.1); color: var(--accent); border: 1px solid var(--accent); padding: 12px; font-family: 'Menlo', monospace; font-size: 0.9rem; font-weight: bold; cursor: pointer; border-radius: 6px; transition: all 0.2s; width: 100%;}
        .btn-toggle.off { background-color: rgba(255, 51, 102, 0.1); color: var(--alert); border: 1px solid var(--alert); }

        /* CENTER COL: Chat */
        .chat-col { display: flex; flex-direction: column; background-color: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; transition: all 0.3s;}
        .chat-history { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth;}
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 8px; line-height: 1.5; font-size: 0.95rem; word-wrap: break-word;}
        .msg.user { align-self: flex-end; background-color: var(--user-msg); border: 1px solid var(--border); border-bottom-right-radius: 2px;}
        .msg.bot { align-self: flex-start; background-color: var(--bot-msg); border: 1px solid var(--accent); color: var(--accent); border-bottom-left-radius: 2px;}
        .typing-indicator { align-self: flex-start; color: var(--accent); font-size: 0.85rem; font-style: italic; display: none; padding-left: 10px;}

        .chat-input-area { display: flex; flex-direction: column; padding: 15px; background-color: #050505; border-top: 1px solid var(--border); gap: 10px;}
        .chat-input-row { display: flex; gap: 10px; }
        .chat-input { flex-grow: 1; background-color: var(--card); border: 1px solid var(--border); padding: 15px; color: var(--text); font-family: 'Menlo', monospace; border-radius: 6px; font-size: 1rem;}
        .chat-input:focus { outline: none; border-color: var(--accent); }
        
        .btn-send { background-color: var(--accent); color: #000; border: none; padding: 0 20px; font-family: 'Menlo', monospace; font-weight: bold; font-size: 1rem; border-radius: 6px; cursor: pointer; transition: all 0.2s;}
        .btn-send:hover { background-color: #00cc33; }
        
        .btn-call { background-color: rgba(0, 255, 65, 0.15); color: var(--accent); border: 1px solid var(--accent); padding: 15px; font-family: 'Menlo', monospace; font-weight: bold; font-size: 1rem; border-radius: 6px; cursor: pointer; transition: all 0.2s;}
        .btn-call:hover { background-color: rgba(0, 255, 65, 0.3); }
        .btn-call:disabled { background-color: #222; color: #555; border-color: #333; cursor: not-allowed; }

        /* RIGHT COL: Debug/Engine Log */
        .log-col { background-color: #000; border: 1px solid var(--border); padding: 15px; border-radius: 8px; overflow-y: auto; font-size: 0.75rem; line-height: 1.4; color: #a1a1aa; font-family: monospace; transition: all 0.3s;}
        .log-col span.info { color: #3b82f6; }
        .log-col span.warn { color: #f59e0b; }
        .log-col span.success { color: var(--accent); }
        .log-col span.user-query { color: #ec4899; }
        .log-col span.alert { color: var(--alert); font-weight: bold; }

        /* ========================================= */
        /* CALL OVERLAY UI */
        /* ========================================= */
        .call-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--call-bg); z-index: 100;
            display: none; flex-direction: column; align-items: center; justify-content: flex-end;
            border-radius: 12px; backdrop-filter: blur(10px); padding-bottom: 50px;
            pointer-events: auto; 
        }
        
        .call-status { font-size: 1.2rem; font-weight: bold; color: var(--accent); letter-spacing: 4px; margin-bottom: 30px; text-transform: uppercase;}

        .btn-end-call { background-color: var(--alert); color: #fff; border: none; padding: 15px 40px; font-family: 'Menlo', monospace; font-weight: bold; font-size: 1.2rem; border-radius: 30px; cursor: pointer; transition: all 0.2s; box-shadow: 0 0 20px rgba(255, 51, 102, 0.4); z-index: 9999;}
        .btn-end-call:hover { background-color: #ff0033; transform: scale(1.05);}

        /* CALL MODE STATE CLASSES */
        body.call-mode .header { opacity: 0; pointer-events: none; height: 0; margin: 0; }
        body.call-mode .settings-panel, body.call-mode .chat-col, body.call-mode .log-col { opacity: 0; pointer-events: none; display: none;}
        body.call-mode .main-grid { display: flex; justify-content: center; align-items: center; }
        
        body.call-mode .left-col { width: 100%; max-width: 650px; align-items: center; justify-content: center; margin-bottom: 120px; z-index: 101; pointer-events: none;}
        body.call-mode .visual-stage { width: 100%; background: transparent; border: none; box-shadow: none; pointer-events: none;}
        body.call-mode #canvas-container { border-radius: 50%; box-shadow: 0 0 50px rgba(0, 255, 65, 0.2); border: 2px solid rgba(0, 255, 65, 0.3); pointer-events: auto;}
        body.call-mode .live-transcript { display: block; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 class="title">Dim<span>JiPiTi</span></h1>
        <div class="subtitle">v3.3.2 / Audio Patch Applied</div>
    </div>

    <div class="main-grid">
        <div class="left-col">
            <div class="visual-stage">
                <div id="canvas-container"></div>
                <div id="loading-text">MOUNTING MESH...</div>
                <div class="live-transcript" id="liveTranscript"></div>
            </div>
            
            <div class="settings-panel">
                <div class="settings-header">SCRAMBLER TUNING</div>
                <div class="slider-row">
                    <label title="Low: Accurate. High: Chaotic.">CHAOS (TEMP): <span id="tempDisp">0.7</span></label>
                    <input type="range" id="tempSlider" min="0.1" max="1.0" step="0.1" value="0.7" oninput="updateUI()">
                </div>
            </div>
            <button class="btn-toggle" id="audioToggle" onclick="toggleAudio()">🔊 AUDIO: ON</button>
        </div>

        <div class="chat-col">
            <div class="chat-history" id="chatHistory">
                <div class="msg bot">System Initialized. Audio pre-loaded. Ras shvebi?</div>
            </div>
            <div class="typing-indicator" id="typingIndicator">DimJiPiTi is typing...</div>
            <div class="chat-input-area">
                <div class="chat-input-row">
                    <input type="text" id="chatInput" class="chat-input" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
                    <button class="btn-send" onclick="sendMessage()">SEND</button>
                </div>
                <button class="btn-call" id="initCallBtn" onclick="initiateCallSequence()">📞 CALL DIMJIPITI</button>
            </div>
        </div>

        <div class="log-col" id="debugLog">
            <span class="info">[SYSTEM] Initializing Hybrid N-Gram Scrambler...</span><br>
            <span class="info">[SYSTEM] Audio drivers pre-fetched...</span><br>
            <span class="success">[SYSTEM] Core Ready.</span><br><br>
        </div>
    </div>

    <div class="call-overlay" id="callOverlay">
        <div class="call-status" id="callStatus">CONNECTING...</div>
        <button class="btn-end-call" onclick="endCall()">END CALL</button>
    </div>
</div>

<script>
    // ==========================================
    // 0. AUDIO STATE & TOGGLE
    // ==========================================
    let audioEnabled = true;

    function toggleAudio() {
        audioEnabled = !audioEnabled;
        const btn = document.getElementById("audioToggle");
        if (audioEnabled) {
            btn.className = "btn-toggle"; 
            btn.innerText = "🔊 AUDIO: ON"; 
        } else {
            btn.className = "btn-toggle off"; 
            btn.innerText = "🔇 AUDIO: OFF"; 
            window.speechSynthesis.cancel(); 
            is3DSpeaking = false; 
            stop3DLipSync();
        }
    }

    // Force browser to load voices aggressively on page load
    if ('speechSynthesis' in window) {
        window.speechSynthesis.getVoices();
        window.speechSynthesis.onvoiceschanged = () => {
            window.speechSynthesis.getVoices();
            logDebug("success", "[AUDIO] Voice packs synced.");
        };
    }

    // ==========================================
    // 1. 3D RENDER ENGINE & HEAD TRACKING
    // ==========================================
    let scene, camera, renderer, faceMesh, controls;
    let is3DSpeaking = false, mouthMesh = null, mouthMorphIndex = -1;
    let targetMouthValue = 0, currentMouthValue = 0, lipSyncInterval;
    
    let targetHeadRotX = 0, targetHeadRotY = 0, targetHeadRotZ = 0;
    let headMovementInterval;

    function init3D() {
        const container = document.getElementById('canvas-container');
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(50, 1, 0.1, 1000); camera.position.z = 5;
        renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true }); 
        
        const rect = container.getBoundingClientRect();
        renderer.setSize(rect.width, rect.height);
        container.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.dampingFactor = 0.05; controls.enableZoom = false; controls.enablePan = false;
        
        scene.add(new THREE.DirectionalLight(0xffffff, 3.0).position.set(2, 2, 5)); 
        scene.add(new THREE.AmbientLight(0x404040, 4.0));

        animate3D(); loadBuiltInModel();
        
        window.addEventListener('resize', () => {
            const newRect = container.getBoundingClientRect();
            renderer.setSize(newRect.width, newRect.height);
            camera.aspect = newRect.width / newRect.height;
            camera.updateProjectionMatrix();
        });
    }

    function animate3D() {
        requestAnimationFrame(animate3D); if (controls) controls.update();
        if (faceMesh) {
            currentMouthValue += (targetMouthValue - currentMouthValue) * 0.3; 
            if (mouthMesh && mouthMorphIndex !== -1) mouthMesh.morphTargetInfluences[mouthMorphIndex] = currentMouthValue;
            else if (is3DSpeaking) faceMesh.position.y = currentMouthValue * -0.2; 
            else faceMesh.position.y += (0 - faceMesh.position.y) * 0.1; 

            faceMesh.rotation.x += (targetHeadRotX - faceMesh.rotation.x) * 0.05;
            faceMesh.rotation.y += (targetHeadRotY - faceMesh.rotation.y) * 0.05;
            faceMesh.rotation.z += (targetHeadRotZ - faceMesh.rotation.z) * 0.05;
        }
        renderer.render(scene, camera);
    }

    function start3DLipSync() { 
        clearInterval(lipSyncInterval); clearInterval(headMovementInterval);
        lipSyncInterval = setInterval(() => { targetMouthValue = (Math.random() > 0.3) ? 0.3 + (Math.random() * 0.7) : 0; }, 120); 
        headMovementInterval = setInterval(() => {
            targetHeadRotX = (Math.random() - 0.5) * 0.2; 
            targetHeadRotY = (Math.random() - 0.5) * 0.4; 
            targetHeadRotZ = (Math.random() - 0.5) * 0.1; 
        }, 800);
    }

    function stop3DLipSync() { 
        clearInterval(lipSyncInterval); clearInterval(headMovementInterval);
        targetMouthValue = 0; 
        targetHeadRotX = 0; targetHeadRotY = 0; targetHeadRotZ = 0;
    }

    function loadBuiltInModel() {
        const loader = new THREE.GLTFLoader();
        const loadingText = document.getElementById('loading-text');
        const timeoutFailsafe = setTimeout(() => {
            loadingText.innerHTML = "⚠️ MESH MOUNT FAILED."; loadingText.style.color = "var(--alert)"; loadingText.style.animation = "none";
        }, 10000);

        loader.load('./perekur_MASK.glb', 
            function (gltf) {
                clearTimeout(timeoutFailsafe); loadingText.style.display = 'none'; 
                if (faceMesh) scene.remove(faceMesh); faceMesh = gltf.scene;
                mouthMesh = null; mouthMorphIndex = -1;
                faceMesh.traverse((child) => {
                    if (child.isMesh && child.morphTargetDictionary) {
                        for (const key in child.morphTargetDictionary) {
                            if (mouthMorphIndex === -1) { mouthMesh = child; mouthMorphIndex = child.morphTargetDictionary[key]; }
                            if (key.toLowerCase().includes('mouth')) { mouthMesh = child; mouthMorphIndex = child.morphTargetDictionary[key]; }
                        }
                    }
                });
                const box = new THREE.Box3().setFromObject(faceMesh), center = box.getCenter(new THREE.Vector3()), size = box.getSize(new THREE.Vector3());
                const scale = 3.5 / Math.max(size.x, size.y, size.z);
                faceMesh.scale.set(scale, scale, scale); faceMesh.position.set(-center.x * scale, -center.y * scale, -center.z * scale);
                scene.add(faceMesh);
            }, 
            function(xhr){}, 
            function(error) { clearTimeout(timeoutFailsafe); loadingText.innerHTML = "⚠️ CORS MESH BLOCK"; loadingText.style.color = "var(--alert)"; loadingText.style.animation="none"; }
        );
    }

    // ==========================================
    // 2. THE DIAL TONE & CALL SEQUENCE 
    // ==========================================
    let audioCtx = null;
    let isCallActive = false;

    function playDialTone() {
        if (!audioEnabled) return;
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        const osc1 = audioCtx.createOscillator();
        const osc2 = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        osc1.type = 'sine'; osc1.frequency.value = 350;
        osc2.type = 'sine'; osc2.frequency.value = 440;

        gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
        gainNode.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.1);
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime + 1.8);
        gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 2.0);

        osc1.connect(gainNode); osc2.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        osc1.start(); osc2.start();
        osc1.stop(audioCtx.currentTime + 2); osc2.stop(audioCtx.currentTime + 2);
    }

    function initiateCallSequence() {
        const btn = document.getElementById("initCallBtn");
        btn.innerText = "REQUESTING MIC...";
        btn.disabled = true;

        navigator.mediaDevices.getUserMedia({ audio: true })
        .then(function(stream) {
            logDebug("success", "[SYSTEM] Microphone permission granted.");
            stream.getTracks().forEach(track => track.stop());

            btn.innerText = "DIALING...";
            playDialTone();

            setTimeout(() => {
                btn.innerText = "📞 CALL DIMJIPITI";
                btn.disabled = false;
                enterCallMode();
            }, 2000);
        })
        .catch(function(err) {
            logDebug("alert", "[SYSTEM] Mic permission denied. " + err.message);
            btn.innerText = "📞 CALL DIMJIPITI";
            btn.disabled = false;
            alert("You must allow microphone permissions to call DimJiPiTi.");
        });
    }

    function enterCallMode() {
        isCallActive = true;
        botIsTalking = false; 
        document.body.classList.add('call-mode');
        document.getElementById("callOverlay").style.display = "flex";
        document.getElementById("liveTranscript").innerText = "";
        
        setTimeout(() => {
            const container = document.getElementById('canvas-container');
            const newRect = container.getBoundingClientRect();
            renderer.setSize(newRect.width, newRect.height);
            camera.aspect = newRect.width / newRect.height;
            camera.updateProjectionMatrix();
        }, 500); 

        logDebug("success", "[CALL] Connection established.");
        initContinuousSpeechRecognition();
    }

    function endCall() {
        isCallActive = false;
        botIsTalking = false; 
        document.body.classList.remove('call-mode');
        document.getElementById("callOverlay").style.display = "none";
        
        window.speechSynthesis.cancel();
        if (recognition) {
            recognition.onend = null; 
            try { recognition.stop(); } catch(e){}
        }
        
        clearTimeout(silenceTimer);
        document.getElementById('liveTranscript').innerText = "";
        
        renderer.domElement.style.width = '100%';
        renderer.domElement.style.height = '100%';

        setTimeout(() => {
            const container = document.getElementById('canvas-container');
            const newRect = container.getBoundingClientRect();
            renderer.setSize(newRect.width, newRect.height);
            camera.aspect = newRect.width / newRect.height;
            camera.updateProjectionMatrix();
        }, 500);

        logDebug("info", "[CALL] Terminated.");
    }


    // ==========================================
    // 3. CONTINUOUS VAD & TAB SWITCHING RECOVERY
    // ==========================================
    let recognition = null;
    let silenceTimer = null;
    let finalTranscript = '';
    let botIsTalking = false; 
    
    document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") {
            if (isCallActive && !botIsTalking && recognition) {
                logDebug("info", "[SYSTEM] Tab refocused. Restarting mic.");
                try { recognition.start(); } catch(e) {}
            }
        } else {
            if (isCallActive && recognition) {
                logDebug("warn", "[SYSTEM] Tab backgrounded. Pausing mic.");
                try { recognition.stop(); } catch(e) {}
            }
        }
    });

    function initContinuousSpeechRecognition() {
        if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
            document.getElementById('callStatus').innerText = "VOICE NOT SUPPORTED";
            document.getElementById('callStatus').style.color = "var(--alert)";
            return;
        }
        
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        
        recognition.continuous = true; 
        recognition.interimResults = true;
        recognition.lang = 'ka-GE'; 

        recognition.onstart = function() {
            if (!botIsTalking && isCallActive) {
                document.getElementById('callStatus').innerText = "LISTENING";
                document.getElementById('callStatus').style.color = "var(--accent)";
                logDebug("info", "[MIC] Speech recognition active.");
            }
        };

        recognition.onresult = function(event) {
            if (botIsTalking) return; 

            clearTimeout(silenceTimer); 
            
            let interim = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript + " ";
                else interim += event.results[i][0].transcript;
            }
            
            document.getElementById('liveTranscript').innerText = finalTranscript + interim;

            silenceTimer = setTimeout(() => {
                if (finalTranscript.trim() !== "" || interim.trim() !== "") {
                    let userMsg = finalTranscript + interim;
                    logDebug("user-query", `[MIC] ${userMsg}`);
                    
                    finalTranscript = ''; 
                    document.getElementById('liveTranscript').innerText = "...";
                    
                    triggerCallResponse(userMsg);
                }
            }, 1500); 
        };

        recognition.onerror = function(event) { 
            logDebug("warn", "[MIC ERROR] " + event.error); 
        };

        recognition.onend = function() {
            if (isCallActive && !botIsTalking && document.visibilityState === "visible") {
                setTimeout(() => {
                    try { recognition.start(); } catch(e) {}
                }, 300);
            }
        };

        try { recognition.start(); } catch(e) { logDebug("alert", "Mic start failed: " + e.message); }
    }

    function triggerCallResponse(userText) {
        botIsTalking = true;
        try { recognition.stop(); } catch(e) {}

        document.getElementById('callStatus').innerText = "THINKING...";
        document.getElementById('callStatus').style.color = "#f59e0b";
        
        appendMessage(userText, 'user');
        
        setTimeout(() => {
            const response = processNLP(userText);
            appendMessage(response, 'bot');
            
            document.getElementById('callStatus').innerText = "SPEAKING";
            document.getElementById('liveTranscript').innerText = response;
            
            if (audioEnabled) {
                playCallTTS(response);
            } else {
                // If muted, just simulate the processing delay
                setTimeout(() => {
                    botIsTalking = false;
                    if(isCallActive) {
                        document.getElementById('callStatus').innerText = "LISTENING";
                        document.getElementById('callStatus').style.color = "var(--accent)";
                        document.getElementById('liveTranscript').innerText = "";
                        try { recognition.start(); } catch(e) {} 
                    }
                }, 2000);
            }
        }, 600); 
    }

    function playCallTTS(text) {
        window.speechSynthesis.cancel();

        let selectedVoice = voices.find(v => v.name.includes('Eddy') && v.lang.includes('it'))

                         || voices.find(v => v.name.includes('Google UK English Male'))
                         || voices.find(v => v.name.includes('Male'))

        if (selectedVoice) {
            msg.voice = selectedVoice;
        }

        msg.onstart = () => { is3DSpeaking = true; start3DLipSync(); };
        
        msg.onend = msg.onerror = () => { 
            is3DSpeaking = false; stop3DLipSync(); 
            botIsTalking = false;

                document.getElementById('callStatus').innerText = "LISTENING";

                document.getElementById('liveTranscript').innerText = "";
                try { recognition.start(); } catch(e) {}

        };
        
        window.speechSynthesis.speak(msg);
    }

    const fallbackConnectors = ["prosta", "anu", "xoda", "mara", "imena", "tan", "magito", "da", "ise vafshe"];
    const emojis = [" 😡", " 😈",  " 🥰", " 🖕", " 😂", " 💀", " 😇", " 🥺", " :DDD"];

    let uniGramDict = {}; let biGramDict = {}; let starts = [];

    function buildScramblerModel() {
        try {
            rawCorpus.forEach(sentence => {
                let words = sentence.trim().split(/\s+/);
                if(words.length === 0) return;
                starts.push(words[0]);
                for(let i = 0; i < words.length; i++) {
                    let w1 = words[i];
                    if(i < words.length - 1) {
                        let w2 = words[i+1];
                        if(!uniGramDict[w1]) uniGramDict[w1] = [];
                        uniGramDict[w1].push(w2);
                    }
                    if(i < words.length - 2) {
                        let w2 = words[i+1]; let w3 = words[i+2]; let key = w1 + " " + w2;
                        if(!biGramDict[key]) biGramDict[key] = [];
                        biGramDict[key].push(w3);
                    }
                }
            });
            logDebug("success", "Dataset Shredded. N-Grams mapped perfectly.");
        } catch(e) { logDebug("warn", "Error building model: " + e.message); }
    }

    function generateScrambledSentence(temp) {
        try {
            let result = [];
            let currentWord = starts[Math.floor(Math.random() * starts.length)];
            if (!currentWord) currentWord = "prosta";
            result.push(currentWord);

            let maxLen = Math.floor(Math.random() * 6) + 3;

            for(let i = 1; i < maxLen; i++) {
                let nextWord = null;
                if (i >= 2 && Math.random() > (temp - 0.2)) {
                    let prevWord = result[i-2]; let key = prevWord + " " + currentWord;
                    if (biGramDict[key] && biGramDict[key].length > 0) nextWord = biGramDict[key][Math.floor(Math.random() * biGramDict[key].length)];
                }
                if (!nextWord && uniGramDict[currentWord] && uniGramDict[currentWord].length > 0) {
                    nextWord = uniGramDict[currentWord][Math.floor(Math.random() * uniGramDict[currentWord].length)];
                }
                if (!nextWord) {
                    result.push(fallbackConnectors[Math.floor(Math.random() * fallbackConnectors.length)]);
                    currentWord = starts[Math.floor(Math.random() * starts.length)];
                    result.push(currentWord);
                    i++;
                } else {
                    result.push(nextWord); currentWord = nextWord;
                }
            }
            return result.join(" ");
        } catch (e) { return "xoda " + fallbackConnectors[Math.floor(Math.random() * fallbackConnectors.length)]; }
    }

    function searchCorpusByIntent(inputTokens) {
        let bestMatch = ""; let maxScore = 0;
        let corpus = rawCorpus; 
        corpus.forEach(sentence => {
            let score = 0; let sentenceTokens = sentence.toLowerCase().split(/\s+/);
            inputTokens.forEach(token => { if(token.length > 2 && sentenceTokens.includes(token)) score++; });
            if(score > maxScore) { maxScore = score; bestMatch = sentence; }
        });
        return maxScore > 0 ? bestMatch : null;
    }

    function processNLP(userInput) {
        let temp = parseFloat(document.getElementById("tempSlider").value);
        let response = "";
        let isRant = Math.random() > 0.95;
        let numSentences = isRant ? (Math.floor(Math.random() * 4) + 3) : (Math.floor(Math.random() * 2) + 1);

        let exactMatch = searchCorpusByIntent(userInput.toLowerCase().replace(/[^\w\s]/gi, '').split(/\s+/));

        if (exactMatch && Math.random() > (temp - 0.2)) {
            response = exactMatch;
            if(Math.random() > 0.5) response += " " + generateScrambledSentence(temp);
        } else {
            for(let i=0; i<numSentences; i++) {
                response += generateScrambledSentence(temp) + (Math.random()>0.5 ? " " : "... ");
            }
        }
        
        response = response.trim();
        if(!response.match(/[.!?]$/)) response += (Math.random() > 0.5 ? "" : "...");
        if (Math.random() > 0.7) response += emojis[Math.floor(Math.random() * emojis.length)];
        return response;
    }

    function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }

    function sendMessage() {
        const input = document.getElementById("chatInput");
        const text = input.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        input.value = '';
        
        const typingIndicator = document.getElementById("typingIndicator");
        typingIndicator.style.display = "block";
        
        setTimeout(() => {
            typingIndicator.style.display = "none";
            const response = processNLP(text);
            appendMessage(response, 'bot');
            
            if(!isCallActive && audioEnabled) {
                window.speechSynthesis.cancel(); 
                let cleanText = response.replace(/[\u{1F600}-\u{1F6FF}\u{1F300}-\u{1F5FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, '');
                let msg = new SpeechSynthesisUtterance(cleanText);
                msg.pitch = 0.65; msg.rate = 0.8; 
                
                let voices = window.speechSynthesis.getVoices();
                let selectedVoice = voices.find(v => v.name.includes('Eddy') && v.lang.includes('it')) 
                                 || voices.find(v => v.lang.includes('it')) 
                                 || voices.find(v => v.name.includes('Google UK English Male'))
                                 || voices.find(v => v.name.includes('Male'))
                                 || voices[0];
                if (selectedVoice) {
                    msg.voice = selectedVoice;
                }
                
                msg.onstart = () => { is3DSpeaking = true; start3DLipSync(); };
                msg.onend = msg.onerror = () => { is3DSpeaking = false; stop3DLipSync(); };
                window.speechSynthesis.speak(msg);
            }
            
            const chatHistory = document.getElementById("chatHistory");
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }, 600 + Math.random() * 1200);
    }

    function appendMessage(text, sender) {
        const chatHistory = document.getElementById("chatHistory");
        const msgDiv = document.createElement("div");
        msgDiv.className = `msg ${sender}`;
        msgDiv.innerText = text;
        chatHistory.appendChild(msgDiv);
        chatHistory.scrollTop = chatHistory.scrollHeight;
    }

    window.onload = () => {
        init3D();
        buildScramblerModel();
    };
