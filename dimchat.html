        #canvas-container:active { cursor: grabbing; }
        #loading-text { position: absolute; color: var(--accent); font-weight: bold; animation: pulse 1.5s infinite; pointer-events: none;}
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .settings-panel { background-color: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 8px; display: flex; flex-direction: column; gap: 10px;}
        .settings-header { color: #71717a; font-size: 0.75rem; border-bottom: 1px solid var(--border); padding-bottom: 4px; font-weight: bold; letter-spacing: 1px;}
        .slider-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.85rem;}
        .slider-row label { font-weight: bold; color: var(--text); min-width: 120px;}
        .slider-row span { color: var(--accent); }
        input[type="range"] { flex-grow: 1; margin: 0 10px; cursor: pointer; accent-color: var(--accent); }
        
        .btn-toggle { background-color: rgba(0, 255, 65, 0.1); color: var(--accent); border: 1px solid var(--accent); padding: 12px; font-family: 'Menlo', monospace; font-size: 0.9rem; font-weight: bold; cursor: pointer; border-radius: 6px; transition: all 0.2s; width: 100%;}
        .btn-toggle.off { background-color: rgba(255, 51, 102, 0.1); color: var(--alert); border: 1px solid var(--alert); }

        /* CENTER COL: Chat */
        .chat-col { display: flex; flex-direction: column; background-color: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        .chat-history { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 8px; line-height: 1.5; font-size: 0.95rem; word-wrap: break-word;}
        .msg.user { align-self: flex-end; background-color: var(--user-msg); border: 1px solid var(--border); border-bottom-right-radius: 2px;}
        .msg.bot { align-self: flex-start; background-color: var(--bot-msg); border: 1px solid var(--accent); color: var(--accent); border-bottom-left-radius: 2px;}
        .typing-indicator { align-self: flex-start; color: var(--accent); font-size: 0.85rem; font-style: italic; display: none; padding-left: 10px;}

        .chat-input-area { display: flex; padding: 15px; background-color: #050505; border-top: 1px solid var(--border); gap: 10px;}
        .chat-input { flex-grow: 1; background-color: var(--card); border: 1px solid var(--border); padding: 15px; color: var(--text); font-family: 'Menlo', monospace; border-radius: 6px; font-size: 1rem;}
        .chat-input:focus { outline: none; border-color: var(--accent); }
        .btn-send { background-color: var(--accent); color: #000; border: none; padding: 0 30px; font-family: 'Menlo', monospace; font-weight: bold; font-size: 1.1rem; border-radius: 6px; cursor: pointer; transition: all 0.2s;}

        .log-col { background-color: #000; border: 1px solid var(--border); padding: 15px; border-radius: 8px; overflow-y: auto; font-size: 0.75rem; line-height: 1.4; color: #a1a1aa; font-family: monospace;}

    let targetMouthValue = 0, currentMouthValue = 0, lipSyncInterval;

    function init3D() {
        const container = document.getElementById('canvas-container');
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(50, 1, 0.1, 1000); camera.position.z = 5;
        renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true }); 
        
        const rect = container.getBoundingClientRect();
        renderer.setSize(rect.width, rect.height);
        container.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.dampingFactor = 0.05; controls.autoRotate = true; controls.autoRotateSpeed = 0.5; controls.enableZoom = true;
        
        scene.add(new THREE.DirectionalLight(0xffffff, 3.0).position.set(2, 2, 5)); 
        scene.add(new THREE.AmbientLight(0x404040, 4.0));

        animate3D(); loadBuiltInModel();
        
        window.addEventListener('resize', () => {
            const newRect = container.getBoundingClientRect();
            renderer.setSize(newRect.width, newRect.height);
            camera.aspect = newRect.width / newRect.height;
            camera.updateProjectionMatrix();
        });
    }

    function animate3D() {
        requestAnimationFrame(animate3D); if (controls) controls.update();
        if (faceMesh) {
            currentMouthValue += (targetMouthValue - currentMouthValue) * 0.3; 
            if (mouthMesh && mouthMorphIndex !== -1) mouthMesh.morphTargetInfluences[mouthMorphIndex] = currentMouthValue;
            else if (isSpeaking) faceMesh.position.y = currentMouthValue * -0.2; 
            else faceMesh.position.y += (0 - faceMesh.position.y) * 0.1; 
        }
        renderer.render(scene, camera);
    }

    function startLipSync() { clearInterval(lipSyncInterval); targetMouthValue = 0; lipSyncInterval = setInterval(() => { targetMouthValue = (Math.random() > 0.3) ? 0.3 + (Math.random() * 0.7) : 0; }, 120); }
    function stopLipSync() { clearInterval(lipSyncInterval); targetMouthValue = 0; }

    function loadBuiltInModel() {
        const loader = new THREE.GLTFLoader();

                mouthMesh = null; mouthMorphIndex = -1;
                faceMesh.traverse((child) => {
                    if (child.isMesh && child.morphTargetDictionary) {
                        for (const key in child.morphTargetDictionary) {
                            if (mouthMorphIndex === -1) { mouthMesh = child; mouthMorphIndex = child.morphTargetDictionary[key]; }
                            if (key.toLowerCase().includes('mouth')) { mouthMesh = child; mouthMorphIndex = child.morphTargetDictionary[key]; }
                        }
                    }
                });
                const box = new THREE.Box3().setFromObject(faceMesh), center = box.getCenter(new THREE.Vector3()), size = box.getSize(new THREE.Vector3());
                const scale = 3.5 / Math.max(size.x, size.y, size.z);
                faceMesh.scale.set(scale, scale, scale); faceMesh.position.set(-center.x * scale, -center.y * scale, -center.z * scale);
                scene.add(faceMesh);
            }, 
            function(xhr){}, 
            function(error) { clearTimeout(timeoutFailsafe); loadingText.innerHTML = "⚠️ CORS MESH BLOCK"; loadingText.style.color = "var(--alert)"; loadingText.style.animation="none"; }

    // Markov Dictionary (Bi-gram mapping)
    let markovDict = {};
    let startingWords = [];

    function buildMarkovModel() {
        corpus.forEach(sentence => {
            let words = sentence.trim().split(/\s+/);
            if(words.length > 0) startingWords.push(words[0]);
            
            for(let i = 0; i < words.length - 2; i++) {
                let key = words[i] + ' ' + words[i+1];
                let next = words[i+2];
                if(!markovDict[key]) markovDict[key] = [];
                markovDict[key].push(next);
            }
        });
        logDebug("success", "Markov Chain constructed. " + Object.keys(markovDict).length + " nodes mapped.");
    }

    function generateMarkovSentence(temp) {
        let sentence = [];
        // The higher the temp, the more random the starting word
        let startWord = startingWords[Math.floor(Math.random() * startingWords.length)];
        sentence.push(startWord);
        
        // Find a valid second word to start the chain
        let validKeys = Object.keys(markovDict).filter(k => k.startsWith(startWord + " "));
        if(validKeys.length === 0) return startWord; // fallback
        
        let initialKey = validKeys[Math.floor(Math.random() * validKeys.length)];
        sentence = initialKey.split(" ");
        
        let currentKey = initialKey;
        // Length 3 to 12 words roughly
        let maxLength = Math.floor(Math.random() * 8) + 4; 

        for(let i = 0; i < maxLength; i++) {
            let possibleNext = markovDict[currentKey];
            if(!possibleNext || possibleNext.length === 0) break;
            
            let nextWord = possibleNext[Math.floor(Math.random() * possibleNext.length)];
            sentence.push(nextWord);
            
            let splitKey = currentKey.split(" ");
            currentKey = splitKey[1] + " " + nextWord;
        }

        return sentence.join(" ");
    }

    function searchCorpusByIntent(inputTokens) {
        // Find sentences in corpus that share the most words with input
        let bestMatch = "";
        let maxScore = 0;

        corpus.forEach(sentence => {
            let score = 0;
            let sentenceTokens = sentence.toLowerCase().split(/\s+/);
            
            inputTokens.forEach(token => {
                if(token.length > 2 && sentenceTokens.includes(token)) {
                    score++;
                }
            });

            if(score > maxScore) {
                maxScore = score;
                bestMatch = sentence;
            }
        });

        return maxScore > 0 ? bestMatch : null;
    }

    function processNLP(userInput) {
        let tokens = userInput.toLowerCase().replace(/[^\w\s]/gi, '').split(/\s+/);
        let temp = parseFloat(document.getElementById("tempSlider").value);
        
        logDebug("user-query", ">> Input Tokenized: [" + tokens.join(", ") + "]");

        let exactMatch = searchCorpusByIntent(tokens);
        let response = "";

        // Temperature Logic: Low Temp = Exact Match. High Temp = Random Markov Generation
        if (exactMatch && Math.random() > (temp - 0.2)) {
            logDebug("info", "[NLP] Intent match found. Fetching deep memory.");
            response = exactMatch;
            // Maybe append a random chunk to make it unique
            if(Math.random() > 0.5) response += " " + generateMarkovSentence(temp);
        } else {
            logDebug("warn", "[NLP] Calculating new neural pathway via Markov Chain.");
            let sentences = Math.random() > 0.5 ? 2 : 1;
            for(let i=0; i<sentences; i++) {
                response += generateMarkovSentence(temp) + (Math.random()>0.5 ? " " : "... ");
            }
        }
        
        // Final pass for realism
        response = response.trim();
        if(!response.match(/[.!?]$/)) response += (Math.random() > 0.5 ? "" : "...");
        return response;
    }

    // ==========================================
    // 4. UI & LOGIC INTEGRATION
    // ==========================================
    
    let audioEnabled = true;

    function logDebug(type, text) {
        const logBox = document.getElementById("debugLog");
        logBox.innerHTML += `<span class="${type}">${text}</span><br>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    function updateUI() {
        document.getElementById("tempDisp").innerText = document.getElementById("tempSlider").value;
        const spinVal = parseFloat(document.getElementById("spinSlider").value);
        document.getElementById("spinDisp").innerText = spinVal.toFixed(1);
        if (controls) controls.autoRotateSpeed = spinVal;
    }

    function toggleAudio() {
        audioEnabled = !audioEnabled; const btn = document.getElementById("audioToggle");
        if (audioEnabled) { btn.className = "btn-toggle"; btn.innerText = "🔊 AUDIO: ON"; } 
        else { btn.className = "btn-toggle off"; btn.innerText = "🔇 AUDIO: OFF"; window.speechSynthesis.cancel(); isSpeaking = false; stopLipSync(); }
    }

    function playTrashyTTS(text) {
        if (!audioEnabled || !('speechSynthesis' in window)) return; window.speechSynthesis.cancel(); 
        let cleanText = text.replace(/[\u{1F600}-\u{1F6FF}\u{1F300}-\u{1F5FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, '');
        let msg = new SpeechSynthesisUtterance(cleanText);
        msg.pitch = 0.65; msg.rate = 0.8; 
        
        let voices = window.speechSynthesis.getVoices();
        let eddyVoice = voices.find(v => v.name.includes('Eddy') && v.lang.includes('it'));
        if (eddyVoice) msg.voice = eddyVoice; else msg.voice = voices.find(v => v.lang.includes('it')) || voices[0];

        msg.onstart = () => { isSpeaking = true; startLipSync(); };
        msg.onboundary = () => { targetMouthValue = 0.8 + (Math.random() * 0.2); };
        msg.onend = msg.onerror = () => { isSpeaking = false; stopLipSync(); };
        window.speechSynthesis.speak(msg);
    }

    if ('speechSynthesis' in window) {
        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
        window.speechSynthesis.getVoices();
    }

    function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }

    function sendMessage() {
        const input = document.getElementById("chatInput");
        const text = input.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        input.value = '';
        
        const typingIndicator = document.getElementById("typingIndicator");
        typingIndicator.style.display = "block";
        
        // Simulated cognitive delay based on text complexity
        const delay = 800 + Math.random() * 1500;
        
        setTimeout(() => {
            typingIndicator.style.display = "none";
            const response = processNLP(text);
            appendMessage(response, 'bot');
            playTrashyTTS(response);
        }, delay);
    }

    function appendMessage(text, sender) {
        const chatHistory = document.getElementById("chatHistory");
        const msgDiv = document.createElement("div");
        msgDiv.className = `msg ${sender}`;
        msgDiv.innerText = text;
        chatHistory.appendChild(msgDiv);
        chatHistory.scrollTop = chatHistory.scrollHeight;
    }

    // BOOT SEQUENCE
    window.onload = () => {
        init3D();
        buildMarkovModel();
    };
</script>
